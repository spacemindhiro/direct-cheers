name: Deploy Email Templates

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - 'supabase/templates/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Deploy email templates to STG
        if: github.ref == 'refs/heads/develop'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_ID: ${{ secrets.STG_SUPABASE_PROJECT_ID }}
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request

          project_id = os.environ["PROJECT_ID"]
          token      = os.environ["SUPABASE_ACCESS_TOKEN"]

          with open("supabase/templates/confirm.html") as f:
            confirm_html = f.read()

          payload = json.dumps({
            "mailer_templates_confirmation_content": confirm_html
          }).encode()

          req = urllib.request.Request(
            f"https://api.supabase.com/v1/projects/{project_id}/config/auth",
            data=payload,
            method="PATCH",
            headers={
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
            }
          )
          with urllib.request.urlopen(req) as res:
            print("STG deploy:", res.status, res.read().decode()[:200])
          EOF

      - name: Deploy email templates to PROD
        if: github.ref == 'refs/heads/main'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_ID: ${{ secrets.PROD_SUPABASE_PROJECT_ID }}
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request

          project_id = os.environ["PROJECT_ID"]
          token      = os.environ["SUPABASE_ACCESS_TOKEN"]

          with open("supabase/templates/confirm.html") as f:
            confirm_html = f.read()

          payload = json.dumps({
            "mailer_templates_confirmation_content": confirm_html
          }).encode()

          req = urllib.request.Request(
            f"https://api.supabase.com/v1/projects/{project_id}/config/auth",
            data=payload,
            method="PATCH",
            headers={
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
            }
          )
          with urllib.request.urlopen(req) as res:
            print("PROD deploy:", res.status, res.read().decode()[:200])
          EOF
