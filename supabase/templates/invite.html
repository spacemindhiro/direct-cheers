<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>招待が届いています | Direct Cheers</title>
</head>
<body style="margin:0;padding:0;background:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0f172a;min-height:100vh;">
    <tr>
      <td align="center" style="padding:48px 16px;">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;">

          <tr>
            <td align="center" style="padding-bottom:32px;">
              <span style="font-size:20px;font-weight:900;color:#ffffff;letter-spacing:-0.05em;font-style:italic;text-transform:uppercase;">
                Direct Cheers
              </span>
            </td>
          </tr>

          <tr>
            <td style="background:#1e293b;border:1px solid #334155;border-radius:24px;padding:40px 32px;">

              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding-bottom:24px;">
                    <span style="font-size:40px;">🎉</span>
                  </td>
                </tr>
              </table>

              <p style="margin:0 0 8px;font-size:10px;font-weight:900;color:#ec4899;text-transform:uppercase;letter-spacing:0.3em;text-align:center;">
                Invitation
              </p>
              <h1 style="margin:0 0 24px;font-size:26px;font-weight:900;color:#ffffff;text-align:center;line-height:1.2;">
                招待が届いています
              </h1>

              <p style="margin:0 0 8px;font-size:14px;color:#94a3b8;line-height:1.7;">
                Direct Cheers にご招待いただきました。
              </p>
              <p style="margin:0 0 32px;font-size:14px;color:#94a3b8;line-height:1.7;">
                以下のボタンから招待を受け取り、アカウントを作成してください。
              </p>

              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding-bottom:24px;">
                    <a href="{{ .ConfirmationURL }}"
                      style="display:inline-block;padding:16px 40px;background:linear-gradient(135deg,#db2777,#ec4899);color:#ffffff;text-decoration:none;border-radius:14px;font-weight:900;font-size:15px;letter-spacing:0.05em;">
                      招待を受け取る
                    </a>
                  </td>
                </tr>
              </table>

              <p style="margin:0 0 8px;font-size:12px;color:#64748b;line-height:1.6;text-align:center;">
                このリンクは24時間有効です。
              </p>
              <p style="margin:0;font-size:12px;color:#64748b;line-height:1.6;text-align:center;">
                心当たりのない場合はこのメールを無視してください。
              </p>

            </td>
          </tr>

          <tr>
            <td align="center" style="padding:32px 0 0;">
              <p style="margin:0 0 4px;font-size:11px;color:#475569;">
                &copy; Direct Cheers. All rights reserved.
              </p>
              <p style="margin:0;font-size:11px;color:#334155;">
                このメールはシステムによって自動送信されています。返信はできません。
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
