name: Fix STG Supabase Site URL

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Restore STG Site URL to stg.direct-cheers.com
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_ID: ${{ secrets.STG_SUPABASE_PROJECT_ID }}
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request

          token      = os.environ["SUPABASE_ACCESS_TOKEN"]
          project_id = os.environ["PROJECT_ID"]

          # STG の Site URL を正しいドメインに修正
          # Redirect URLs も STG + ローカル用のみに限定
          payload = json.dumps({
            "site_url": "https://stg.direct-cheers.com",
            "uri_allow_list": "https://stg.direct-cheers.com/**,http://localhost:3000/**,https://127.0.0.1:3000/**"
          }).encode()

          req = urllib.request.Request(
            f"https://api.supabase.com/v1/projects/{project_id}/config/auth",
            data=payload,
            method="PATCH",
            headers={
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
            }
          )
          try:
            with urllib.request.urlopen(req) as res:
              result = json.loads(res.read().decode())
              print("site_url:", result.get("site_url"))
              print("uri_allow_list:", result.get("uri_allow_list"))
              print("Done.")
          except urllib.error.HTTPError as e:
            body = e.read().decode()
            print(f"HTTP {e.code}: {body}")
            raise
          EOF
