name: Integration Test Suite

# ──────────────────────────────────────────────────────────────────
# トリガー: develop への push + main への PR
#
# develop push で先にテストを回し、グリーンを確認してから PR を作る。
# main への PR 時も同様に走り、マージゲートとして機能する。
#
# branch protection 設定:
#   ✅ Require status checks to pass before merging
#   ✅ "test / 985ケース全テスト" を必須ステータスに追加
# ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# 同一ブランチへの連続プッシュ時は古いランを自動キャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 985ケース全テスト
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── 1. ソース取得 ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Node.js セットアップ ────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25.x'
          cache: 'npm'

      - name: Install dependencies (npm ci)
        run: npm ci

      # ── 2.5. 生カード番号がコードに混入していないか検査 ──────────────
      # 本番APIキーで実行されると PCI DSS 違反・アカウント停止につながるため
      # Stripeテスト番号パターン（4242...等）をソースに直書きしたまま push させない
      - name: Check no raw card numbers in source
        run: |
          # Stripeの代表的なテストカード番号パターンを検索
          if grep -rn --include="*.ts" --include="*.tsx" --include="*.js" \
            -E "(4242424242424242|4000000000009995|4000000000003220|4111111111111111|5500000000000004)" \
            --exclude-dir=node_modules --exclude-dir=".next" .; then
            echo "❌ 生カード番号がソースコードに含まれています。pm_card_* 等の定義済みトークンを使用してください。"
            exit 1
          fi
          echo "✅ 生カード番号なし"

      # ── 3. Supabase ローカル DB 起動 ───────────────────────────────
      # supabase start はマイグレーションを自動適用してコンテナを起動する
      #
      # version は latest ではなく固定バージョンを指定する。理由は2つ:
      #   1. latest はGitHub APIで毎回最新リリースを解決するため、
      #      連続pushが続くとAPIレート制限に引っかかりCLIのセットアップ自体が失敗する
      #      (2026-07-13: "Failed to resolve latest Supabase CLI release: rate limit exceeded")
      #   2. あるバージョン以降、ローカル開発スタックの認証キー体系が
      #      legacy anon/service_role key から新方式 publishable/secret key に変わり、
      #      GitHub Secretsに設定済みの旧形式キー(NEXT_PUBLIC_SUPABASE_ANON_KEY等)が
      #      PostgRESTに拒否されるようになった(ヘルスチェックが30回リトライすべて失敗する形で発覚)。
      #      2.84.2は旧キー体系のまま動作することを手元で確認済み。
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.84.2

      - name: Start local Supabase (with migrations)
        run: supabase start
        timeout-minutes: 10

      # ── 3.5. PostgREST スキーマキャッシュの反映待ち ───────────────────
      # supabase start はマイグレーション適用完了を待って返るが、PostgREST側の
      # スキーマキャッシュ再読み込み(NOTIFY pgrst経由)は非同期で走るため、
      # 起動直後は最新マイグレーションで追加したテーブルをまだ認識していないことがある。
      # 反映前にテストが走ると該当テーブル操作が500/400で失敗するため、
      # REST APIがそのテーブルを認識するまで明示的にポーリングする。
      #
      # 注意: ここでチェックするテーブル名は「直近のマイグレーションで新規追加した
      # テーブル」を指す必要がある。テーブルをリネーム・削除するマイグレーションを
      # 追加した際は、このcurlの対象テーブル名も一緒に更新すること
      # (2026-07-13: display_track_qr_configs→qr_groupsへの置き換えで
      #  このチェックが存在しないテーブルを永遠にポーリングして失敗した実例あり)
      - name: Wait for PostgREST schema cache
        env:
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:54321/rest/v1/qr_groups?limit=0" \
                 -H "apikey: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}" \
                 -H "Authorization: Bearer ${NEXT_PUBLIC_SUPABASE_ANON_KEY}" >/dev/null 2>&1; then
              echo "✅ PostgREST schema cache is ready (${i}回目で確認)"
              exit 0
            fi
            echo "⏳ PostgREST schema cache not ready yet, retrying (${i}/30)..."
            sleep 1
          done
          echo "::error::PostgREST did not pick up qr_groups within timeout"
          exit 1

      # ── 4. .env.test 生成 ──────────────────────────────────────────
      # 全シークレットは GitHub Secrets から注入
      # Supabase CLI v2.x は出力形式が変わったため動的取得せず Secrets を使用
      - name: Generate .env.test
        env:
          STRIPE_SECRET_KEY:                  ${{ secrets.STRIPE_SECRET_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET:              ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY:      ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:          ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET:                        ${{ secrets.CRON_SECRET }}
          INTERNAL_API_SECRET:                ${{ secrets.INTERNAL_API_SECRET }}
        run: |
          {
            echo "STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}"
            echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}"
            echo "STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}"
            echo "NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}"
            echo "NEXT_PUBLIC_SITE_URL=http://localhost:3000"
            echo "CRON_SECRET=${CRON_SECRET:-test_cron_secret}"
            echo "INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-test_internal_secret}"
          } > .env.test

          echo "✅ .env.test 生成完了"

      # ── 5. テスト実行（985ケース）──────────────────────────────────
      # 1件でも失敗したら終了コード 1 → ジョブ FAIL → Vercel デプロイ遮断
      - name: Run 985 integration tests
        run: npm run test:ci
        env:
          CI: true

      # ランナーは使い捨て VM のためクリーンアップ不要
